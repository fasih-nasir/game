<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Detail</title>

  <link rel="stylesheet" href="css/style.css">
  <!-- ✅ Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- ✅ Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

  <main>
    <!-- ========== HEADER CODE START =========== -->
    <section>
      <div id="header"></div>
    </section>
    <!-- ========== HEADER CODE START =========== -->
    <!-- ========= MAIN CODE START ============== -->

    <!-- ============ BANNER CODE START ============= -->
    <div class="container-fluid position-relative m-0 p-0 carousel_page ">
      <img src="assets/logo/r.webp" class="img-fluid banner_img " alt="Blog Banner">
      <div class="position-absolute top-0 d-flex flex-column justify-content-center h-100 align-items-center">
        <div class="blog-hero-content text-center col-lg-6 col-12 text-white">
          <h1>Money Saving Blog</h1>
          <p>Stay updated with the latest money-saving tips, shopping guides, and exclusive discount code information.
            Learn how to save money on your favorite brands with our expert advice.</p>
        </div>
      </div>
    </div>


    <!-- ============ BANNER CODE END ============= -->

    <!-- ============== BLOG SECTION CODE START =============== -->
    <section>
      <div class="container py-4">
        <div class="section-header text-center">
          <h2 class="section-title text-center">
            <span class="title-normal">Latest</span>
            <span class="title-highlight col-org">Blog Posts</span>
          </h2>
          <p class="section-subtitle">Stay updated with the latest deals, tips, and shopping guides</p>
        </div>
      </div>

      <!-- =========== BLOG INNHER CODE START ================ -->
      <div class="container">
        <!-- ======== TABS NAME CODE START ======= -->
        <div class="row">
          <a href="blog.html" class="btn bg text-white mb-3">&larr; Back to Blogs</a>
          <div class="container-fluid d-flex flex-lg-row flex-column my-4 ">
            <div class="col-lg-9 pe-lg-2">
              <div class="col-lg-11 p-lg-2 bg-white rounded-4" id="blogContainer" >
                   <div class="spinner-border mx-auto" role="status">
  <span class="sr-only"></span>
</div>
              </div>
            </div>
            <div class="col-lg-3">
              <div class="col-12">
                <!-- ===================== RECOMCNED CODE START ===================== -->
                <div id="recom_div">
                  <!-- ======================== SINGLE RECOM CODE START ================ -->
                  <div class="spinner-border mx-auto" role="status">
  <span class="sr-only"></span>
</div>
                  <!-- ======================== SINGLE RECOM CODE END ================ -->
                </div>

                <!-- ===================== RECOMCNED CODE END ===================== -->

              </div>
            </div>
          </div>
        </div>
        <!-- ======== TABS NAME CODE END ======= -->

      </div>
      <!-- =========== BLOG INNHER CODE END ================ -->

    </section>
    <!-- ============ BLOG SECTION CODE END ==================== -->

    <!-- ========= TABS CODE START =================== -->

  </main>
  <!-- ========= MAIN CODE END ============== -->

  <!-- ========== FOOTER CODE START ============ -->
  <div id="footer"></div>
  <!-- =========== FOOTER CODE END ============= -->


  <!-- ✅ Bootstrap 5 JS (with Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

  <!-- =========== SWIPER CDN ========== -->
  <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
  <script src="js/app.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
