 <div class="container">

  <li class="nav-item" role="presentation">

  </li>
</ul>
<div class="tab-content" id="myTabContent">
  <div class="tab-pane bg-white my-3 p-2 border-0 round_20 fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
    <div id="desc" class="py-3"></div>
  </div>
  <div class="tab-pane bg-white my-3 p-2 border-0 round_20 fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">   <p>
            Cash on Delivery is available in major cities of Pakistan. Orders above Rs. 10,000 require bank transfer.
          </p></div>
  <div class="tab-pane bg-white my-3 p-2 border-0 round_20 fade" id="contact" role="tabpanel" aria-labelledby="contact-tab">


    <div class="p-2">
      
 <!-- <h4 class="mb-2">There are no reviews yet.</h4> -->
    <p class="mb-4 pt-2 fs-6">
      Be the first to review <strong>“Green Broccoli”</strong><br>
      <small>Your email address will not be published. Required fields are marked *</small>
    </p>

    <form id="reviewForm" class="round_20 p-3" >
      <h5 class="mb-3">Write a Review here</h5>

      <!-- Rating -->
      <div class="mb-3 form-control pb-3">
        <label class="form-label">Your rating *</label><br>
        <div class="d-flex gap-2">
  <label><input type="checkbox" name="rating" class="round_20" value="1"> </label>
  <label><input type="checkbox" name="rating" class="round_20" value="2"> </label>
  <label><input type="checkbox" name="rating" class="round_20" value="3"> </label>
  <label><input type="checkbox" name="rating" class="round_20" value="4"> </label>
  <label><input type="checkbox" name="rating" class="round_20" value="5"> </label>
</div>
      </div>

      <!-- Review -->
      <div class="mb-3">
        <div class="form-floating">
          <textarea id="review" class="form-control" style="height:120px" placeholder="Your review"></textarea>
          <label>Your review *</label>
        </div>
      </div>

      <!-- Name -->
      <div class="mb-3">
        <div class="form-floating">
          <input id="name" type="text" class="form-control" placeholder="Name">
          <label>Name *</label>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <div class="form-floating">
          <input id="email" type="email" class="form-control" placeholder="Email">
          <label>Email *</label>
        </div>
      </div>

      <button id="revew_btn" class="btn btn-dark px-4">
        Submit Review
      </button>

    </form>
    </div>

  </div>
</div>

 </div>

<div class="modal fade" id="questionModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Ask a Question</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="ask_question"> <!-- ✅ ID added -->

          <div class="row m-0 p-0">

            <div class="col-md-6 mb-2">
              <div class="form-floating">
                <input id="name" type="text" class="form-control" placeholder="Name">
                <label>Name</label>
              </div>
            </div>

            <div class="col-md-6 mb-2">
              <div class="form-floating">
                <input id="email" type="email" class="form-control" placeholder="Email">
                <label>Email</label>
              </div>
            </div>

            <div class="col-12 mb-2">
              <div class="form-floating">
                <input id="phone" type="tel" class="form-control" placeholder="Phone">
                <label>Phone Number</label>
              </div>
            </div>

            <div class="col-12 mb-2">
              <div class="form-floating">
                <textarea id="message" class="form-control" style="height:120px"></textarea>
                <label>Message</label>
              </div>
            </div>

            <div class="col-12 text-center">
              <button type="submit" class="btn btn-dark px-4">
                Send
              </button>
            </div>

          </div>

        </form>
      </div>

    </div>
  </div>
</div>
