         //  ============== READ STORE CODE START ====================
 document.addEventListener("DOMContentLoaded", async () => {

  const tableBody = document.querySelector("#storeTable tbody");
  tableBody.innerHTML = "";

  try {
    const eventsRef = collection(db, "events");
    const snapshot = await getDocs(eventsRef);

    let count = 1;

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const id = docSnap.id;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${count++}</td>
        <td>${data.event_name || "-"}</td>
        <td>${data.seo?.seo_url || "-"}</td>
        <td>
          ${
            data.images?.front
              ? `<img src="${data.images.front}" width="60" class="rounded">`
              : "-"
          }
        </td>
        <td>${data.event_type || "-"}</td>
        <td>
          ${
            data.status
              ? `<span class="badge bg-success">Enabled</span>`
              : `<span class="badge bg-danger">Disabled</span>`
          }
        </td>
        <td>${data.createdAt ? new Date(data.createdAt).toLocaleDateString() : "-"}</td>
        <td>
          <a href="edit_events.html?id=${id}" class="btn btn-sm btn-primary me-1">
            Edit
          </a>
          <button class="btn btn-sm btn-danger delete-btn" data-id="${id}">
            Delete
          </button>
        </td>
      `;

      tableBody.appendChild(tr);
    });

  } catch (err) {
    console.error(err);
    alert("❌ Error loading events");
  }

  // ================= DELETE EVENT =================
  document.addEventListener("click", async (e) => {
    if (e.target.classList.contains("delete-btn")) {
      const id = e.target.getAttribute("data-id");

      if (!confirm("Are you sure you want to delete this event?")) return;

      try {
        await deleteDoc(doc(db, "events", id));
        alert("✅ Event deleted");
        location.reload(); // refresh table
      } catch (err) {
        console.error(err);
        alert("❌ Failed to delete event");
      }
    }
  });

});
