const categoryselect = document.getElementById("categoryselect");
async function loadStores2() {
  try {
    const storeSnapshot = await getDocs(collection(db, "categories"));
    
    
    categoryselect.innerHTML = `<option value="">Select Store</option>`;
    storeSnapshot.forEach(doc => {
      const data = doc.data();

     
      
      categoryselect.innerHTML += `<option value="${data.metaTitle}">${data.metaTitle}</option>`;
    });
  } catch (err) {
    console.error("Error fetching stores:", err);
    categoryselect.innerHTML = `<option value="">Error loading stores</option>`;
  }
}
