        <!-- Firebase and App Scripts -->
   <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc ,onSnapshot,doc,updateDoc,deleteDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        const firebaseConfig = {
  apiKey: "AIzaSyB7tXC_WwsU-bxv3xqFt9JTdFUj-3wmmms",
  authDomain: "game-3df4d.firebaseapp.com",
  projectId: "game-3df4d",
  storageBucket: "game-3df4d.firebasestorage.app",
  messagingSenderId: "324919159749",
  appId: "1:324919159749:web:1ef8ee2197c68bcf65b9ac",
  measurementId: "G-E9912X3V8B"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// References
const categoryCollection = collection(db, "blog_categories");
const categoryForm = document.getElementById("categoryForm");
const categoryInput = document.getElementById("categoryInput");
const categoriesList = document.getElementById("categoriesList");

// Modal elements
const editModal = new bootstrap.Modal(document.getElementById('editModal'));
const editForm = document.getElementById("editForm");
const editCategoryName = document.getElementById("editCategoryName");
const editCategoryStatus = document.getElementById("editCategoryStatus");
const deleteCategoryBtn = document.getElementById("deleteCategoryBtn");

let currentEditId = null;

// Add new category
categoryForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = categoryInput.value.trim();
  if (name) {
    await addDoc(categoryCollection, { name, active: true });
    categoryInput.value = "";
  }
});

// Render category
function renderCategory(docData, docId) {
  const div = document.createElement("div");
  div.setAttribute("data-id", docId);
  div.classList.add("list-group-item", "d-flex", "justify-content-between", "align-items-center","my-2");

  const statusText = docData.active ? "Active" : "Inactive";

  div.innerHTML = `
    <span>${docData.name} (<strong>${statusText}</strong>)</span>
    <button class="btn btn-sm  editBtn"><i class="hgi hgi-stroke hgi-pencil-edit-02 fs-4"></i></button>
  `;

  // Edit button opens modal
  div.querySelector(".editBtn").addEventListener("click", () => {
    currentEditId = docId;
    editCategoryName.value = docData.name;
    editCategoryStatus.value = docData.active ? "true" : "false";
    editModal.show();
  });

  categoriesList.appendChild(div);
}

// Real-time listener
onSnapshot(categoryCollection, (snapshot) => {
  categoriesList.innerHTML = "";
  snapshot.docs.forEach(docItem => renderCategory(docItem.data(), docItem.id));
});

// Save changes from modal
editForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!currentEditId) return;
  const docRef = doc(db, "blog_categories", currentEditId);
  await updateDoc(docRef, {
    name: editCategoryName.value.trim(),
    active: editCategoryStatus.value === "true"
  });
  editModal.hide();
});

// Delete category from modal
deleteCategoryBtn.addEventListener("click", async () => {
  if (!currentEditId) return;
  if (confirm("Are you sure you want to delete this category?")) {
    const docRef = doc(db, "blog_categories", currentEditId);
    await deleteDoc(docRef);
    editModal.hide();
  }
});
</script>
