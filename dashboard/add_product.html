                    <!-- ================ ADD PRODUCT CODE START ============ -->
                     <div class="container-fluid mt-5 overflow_y p-4">
         
<h4 class="mb-3">Add New product</h4>
<form class="container " id="storeForm"> 

<!-- ================= TOGGLES ================= -->
<div class="form-control mb-4">
  <div class="row px-2 align-items-center">

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="show_home">
      <label class="form-check-label">Show Home</label>
    </div>

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="arrivals">
      <label class="form-check-label">New Arrivals</label>
    </div>

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="best_selling">
      <label class="form-check-label">Best Selling</label>
    </div>

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="feature">
      <label class="form-check-label">Feature</label>
    </div>

    <div class="col-md-2 ms-auto">
      <select id="Status" class="form-select">
        <option value="">Status</option>
        <option value="active">Active</option>
        <option value="disable">Disable</option>
      </select>
    </div>

  </div>
</div>

<!-- ================= BASIC INFO ================= -->
<div class="row g-3">

  <div class="col-md-6">
    <div class="form-floating">
      <input type="text" class="form-control" id="productTitle" placeholder="Product Title">
      <label>Product Title *</label>
    </div>
  </div>
 <div class="col-md-6">
    <div class="form-floating">
      <input type="text" class="form-control" id="slug" placeholder="Page URL" value=".html">
      <label for="slug">Page URL (product.html)</label>
    </div>
  </div>
  <div class="col-md-12">
    <div class="form-floating">
      <select class="form-select categoryselect" id="categoryselect" >
     
      </select>
      <label>Category</label>
    </div>
  </div>


</div>

<!-- ================= PRICING ================= -->
<div class="row g-3 mt-2">

  <div class="col-md-4">
    <div class="form-floating">
      <input type="number" class="form-control" id="price" placeholder="Price">
      <label>Price</label>
    </div>
  </div>

  <div class="col-md-4">
    <div class="form-floating">
      <input type="number" class="form-control" id="discount_price" placeholder="Discount Price">
      <label>Discount Price</label>
    </div>
  </div>

  <div class="col-md-4">
    <div class="form-floating">
      <input type="number" class="form-control" id="rating" placeholder="Rating">
      <label>Rating (1-5)</label>
    </div>
  </div>

</div>

<!-- ================= INVENTORY ================= -->
<div class="row g-3 mt-2">

  <div class="col-md-4">
    <div class="form-floating">
      <input type="number" class="form-control" id="stock" placeholder="Stock">
      <label>Stock Quantity</label>
    </div>
  </div>

  <div class="col-md-4">
    <div class="form-floating">
      <input type="text" class="form-control" id="submittedBy" placeholder="Submitted By">
      <label>Submitted By</label>
    </div>
  </div>
  <div class="col-md-4">
    <div class="form-floating">
      <input type="text" class="form-control" id="productCode" placeholder="Product Code">
      <label>Product Code</label>
    </div>
  </div>

</div>

<!-- ================= DESCRIPTION ================= -->
<div class="mt-3">
  <div class="form-floating">
    <textarea class="form-control" id="description" placeholder="Description" style="height:120px"></textarea>
    <label>Description</label>
  </div>
</div>

<!-- ================= IMAGE ================= -->
<div class="mt-4">
  <label class="form-label">Product Image  ( Note ! Use Image Without Background : If you want to remove Background visit  this site :   <a href="https://www.remove.bg/">BG Remove Site </a> )</label>
  <input class="form-control mb-3" type="file" id="storeImg" accept="image/*">

  <div class="text-center">
    <img id="image_preview" src="https://placehold.co/600x400" 
         class="img-fluid rounded shadow" style="max-height:150px;">
  </div>
</div>

<!-- ================= SEO ACCORDION ================= -->
<div class="accordion mt-4" id="seoAccordion">

  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#seoCollapse">
        SEO Settings
      </button>
    </h2>

    <div id="seoCollapse" class="accordion-collapse collapse">
      <div class="accordion-body">

        <div class="row g-3">

          <div class="col-md-4">
            <div class="form-floating">
              <input type="text" class="form-control" id="meta_title" placeholder="Meta Title">
              <label>Meta Title</label>
            </div>
          </div>

          <div class="col-md-4">
            <div class="form-floating">
              <input type="text" class="form-control" id="meta_keywords" placeholder="Meta Keywords">
              <label>Meta Keywords</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating">
              <textarea class="form-control" id="meta_desc" placeholder="Meta Description" style="height:100px"></textarea>
              <label>Meta Description</label>
            </div>
          </div>

          <div class="col-md-4">
            <div class="form-floating">
              <input type="url" class="form-control" id="canonical" placeholder="Canonical">
              <label>Canonical URL</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating">
              <textarea class="form-control" id="schema" placeholder="Schema" style="height:120px"></textarea>
              <label>Schema JSON</label>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

</div>

<!-- ================= SUBMIT ================= -->
<div class="text-center mt-4">
  <button class="btn btn-dark px-5" type="submit">Save Product</button>
</div>

</form>
</div>

                    <!-- ================ ADD PRODUCT CODE END ============ -->
