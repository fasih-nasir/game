const categoryselect = document.getElementById("categoryselect");
async function loadStores2() {
  try {
    const storeSnapshot = await getDocs(collection(db, "categories"));
    
    
    categoryselect.innerHTML = `<option value="">Select Category</option>`;
    storeSnapshot.forEach(doc => {
      const data = doc.data();
    
     
     
      
      categoryselect.innerHTML += `<option value="${data.pageTitle}">${data.pageTitle}</option>`;
    });
  } catch (err) {
    console.error("Error fetching stores:", err);
    categoryselect.innerHTML = `<option value="">Error loading Category</option>`;
  }
}
loadStores2();

      const docRef = doc(db, "store", page_id);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {
  const data = docSnap.data();
  if (data.image) {
  const preview = document.getElementById("storeImgPreview");
  preview.src = data.image;
  preview.classList.remove("d-none");
}
// console.log(data);

// console.log(dv
var status_select=document.getElementById("status_select");
  status_select.value=data.status || "";
  // BASIC
  storeName.value      = data.name || "";
if (data.faq && data.faq.trim() !== "") {
  // FAQ already exists → show it in editor
  // console.log(data.faq);
    quill.clipboard.dangerouslyPasteHTML(data.faq);
  // quill.root.innerText = data.faq;
} else {
  // FAQ does not exist → empty editor
  // quill.root.innerHTML = "";
    quill.setText("");
}

  storeLink.value      = data.link || "";
  storeAbout.value     = data.about || "";
 storeDesc.value = data.description && data.description.trim() !== ""
  ? data.description
  : "";


  categoryselect.value = data.category || "";

  // SOCIAL
  s_links_1.value = data.facebook || "";
  s_links_2.value = data.twitter || "";
  s_links_3.value = data.instagram || "";
  s_links_4.value = data.youtube || "";

 // ================= SEO AUTO FILL (SAFE) =================

// Make sure seo object exists
const seo = data.seo || {};

// Title Heading
title_heading.value    = seo.title_heading    || "";

// SEO URL
seo_url.value          = seo.seo_url          || "";

// Meta Title
meta_title.value       = seo.meta_title       || "";

// Meta Keywords
meta_keywords.value    = seo.meta_keywords    || "";

// Meta Description
meta_description.value = seo.meta_description || "";

// Canonical URL
canonical_url.value    = seo.canonical_url    || "";

// Schema
schema.value           = seo.schema           || "";


  // CHECKBOXES

  recommended.checked = data.recommended === true;
covid_disable.checked    = data.covid_disable === true;
auto_sort.checked        = data.auto_sort === true;

student_discount.checked = data.student_discount === true;

  }

} else {
  console.log("No such document!");
}

        //  ============== ADD STORE CODE START ====================
        //  ============== ADD STORE CODE START ====================
storeForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = storeImg.files[0];

  let imageUrl = "";

  try {

    // 🔹 If new image selected → upload
    if (file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "games-acc");

      const res = await fetch(
        "https://api.cloudinary.com/v1_1/deq6ngtkw/image/upload",
        { method: "POST", body: formData }
      );

      const imgData = await res.json();
      imageUrl = imgData.secure_url;
    }

    await updateDoc(doc(db, "store", page_id), {
      // BASIC
      name: storeName.value.trim(),
      faq:quill.root.innerHTML,
      link: storeLink.value.trim(),
      about: storeAbout.value.trim(),
      status:status_select.value,
      description: storeDesc.value.trim(),
      category: categoryselect.value,

      // SOCIAL
      facebook: s_links_1.value.trim(),
      twitter: s_links_2.value.trim(),
      instagram: s_links_3.value.trim(),
      youtube: s_links_4.value.trim(),

      // SEO
      title_heading: title_heading.value.trim(),
      seo_url: seo_url.value.trim(),
      meta_title: meta_title.value.trim(),
      meta_keywords: meta_keywords.value.trim(),
      meta_description: meta_description.value.trim(),
      canonical_url: canonical_url.value.trim(),
      schema: schema.value.trim(),

      // CHECKBOX
      featured: featured.checked,
      recommended: recommended.checked,
  covid_disable: covid_disable.checked,
  auto_sort: auto_sort.checked,
  show_trending: show_trending.checked,
  student_discount: student_discount.checked,
      // IMAGE (only if updated)
      ...(imageUrl && { image: imageUrl }),

      updatedAt: new Date().toISOString()
    });

    alert("✅ Store updated successfully!");

  } catch (err) {
    console.error(err);
    alert("❌ Update failed!");
  }
});
