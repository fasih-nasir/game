const categorySelect = document.getElementById("category");
const categoryCollection = collection(db, "blog_categories");

// Real-time listener to populate select
onSnapshot(categoryCollection, (snapshot) => {
  // Clear previous options except the first placeholder
  categorySelect.innerHTML = '<option value="">-- Select Category --</option>';

  snapshot.docs.forEach(docItem => {
    const data = docItem.data();
console.log(data);

    const option = document.createElement("option");
    option.value = data.name;        // you can use ID as value
    option.textContent = data.name;   // name shown to user
    categorySelect.appendChild(option);
  });
});

 // ============== GET BLOGS & SHOW IN TABLE ====================
// ============== GET BLOGS & SHOW IN TABLE ====================
const params = new URLSearchParams(window.location.search);
const blogId = params.get("id");

const editBlogForm = document.getElementById("editBlogForm");
const editImagePreview = document.getElementById("editImagePreview");

async function loadBlogForEdit() {
  const snap = await getDoc(doc(db, "blog", blogId));
  const blog = snap.data();

  document.getElementById("editBlogId").value = blogId;
  document.getElementById("editTitle").value = blog.title;
  document.getElementById("editAuthor").value = blog.author;
  document.getElementById("editStatus").value = blog.status;
  document.getElementById("editFeatured").checked = blog.featured;
  document.getElementById("editRecommended").checked = blog.recommended;
  document.getElementById("category").value = blog.category_id;
  document.getElementById("editExcerpt").value = blog.excerpt;
  document.getElementById("editContent").value = blog.content;

  document.getElementById("editMetaTitle").value = blog.seo?.meta_title || "";
  document.getElementById("editSlug").value = blog.seo?.slug || "";
  document.getElementById("editSortOrder").value = blog.seo?.sort_order || 0;
  document.getElementById("editMetaKeywords").value = blog.seo?.meta_keywords || "";
  document.getElementById("editMetaDescription").value = blog.seo?.meta_description || "";
  document.getElementById("editCanonical").value = blog.seo?.canonical_url || "";
  document.getElementById("editSchema").value = blog.seo?.schema || "";

  if (blog.image) editImagePreview.src = blog.image;
}

loadBlogForEdit();

editBlogForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  // Optional: upload new image to Cloudinary here if changed
  const updatedData = {
    title: document.getElementById("editTitle").value,
    author: document.getElementById("editAuthor").value,
    status: document.getElementById("editStatus").value,
    featured: document.getElementById("editFeatured").checked,
    recommended: document.getElementById("editRecommended").checked,
    category_id: document.getElementById("category").value,
    excerpt: document.getElementById("editExcerpt").value,
    content: document.getElementById("editContent").value,
    seo: {
      meta_title: document.getElementById("editMetaTitle").value,
      slug: document.getElementById("editSlug").value,
      sort_order: Number(document.getElementById("editSortOrder").value),
      meta_keywords: document.getElementById("editMetaKeywords").value,
      meta_description: document.getElementById("editMetaDescription").value,
      canonical_url: document.getElementById("editCanonical").value,
      schema: document.getElementById("editSchema").value
    }
  };

  await updateDoc(doc(db, "blog", blogId), updatedData);
  alert("✅ Blog updated successfully!");
});
