 // ============== GET BLOGS & SHOW IN TABLE ====================
// ============== GET BLOGS & SHOW IN TABLE ====================
const blogsTableBody = document.getElementById("blogsTableBody");

// ================= LOAD BLOGS =================
async function loadBlogs() {
  blogsTableBody.innerHTML = "";
  const snapshot = await getDocs(collection(db, "blog"));
  let index = 1;

  snapshot.forEach((docSnap) => {
    const blog = docSnap.data();
    const id = docSnap.id;

    blogsTableBody.innerHTML += `
      <tr>
        <td>${index++}</td>
        <td>${blog.image ? `<img src="${blog.image}" width="50">` : "No Image"}</td>
        <td>${blog.title || "-"}</td>
        <td>${blog.author || "-"}</td>
        <td><span class="badge ${blog.status === "published" ? "bg-success" : "bg-secondary"}">${blog.status || "draft"}</span></td>
        <td>${blog.featured ? "Yes" : "No"}</td>
        <td>
          <button class="border-0  text-dark p-1 btn-sm bg-white 
           fs-4 " onclick="viewBlog('${id}')"><i class="hgi hgi-stroke hgi-view"></i></button>
          <a href="edit_blog.html?id=${id}" class="border-0  text-dark p-1 btn-sm bg-white 
           fs-4 "><i class="hgi hgi-stroke hgi-pencil-edit-02"></i></a>
          <button class="border-0  text-dark p-1 btn-sm bg-white 
           fs-4 " onclick="deleteBlog('${id}')"><i class="hgi hgi-stroke hgi-delete-01"></i></button>
        </td>
      </tr>
    `;
  });
}

loadBlogs();

// ================= VIEW BLOG =================
window.viewBlog = async function(id) {
  const snap = await getDoc(doc(db, "blog", id));
  const blog = snap.data();
console.log(blog);

  document.getElementById("viewBlogContent").innerHTML = `
    <h4>${blog.title}</h4>
    <p><strong>Author:</strong> ${blog.author}</p>
    <p><strong>Status:</strong> ${blog.status}</p>
    <p><strong>Featured:</strong> ${blog.featured ? "Yes" : "No"}</p>
    <p><strong>Recommended:</strong> ${blog.recommended ? "Yes" : "No"}</p>
    <p><strong>Category ID:</strong> ${blog.category_id}</p>
    <p><strong>Excerpt:</strong> ${blog.excerpt || ""}</p>
    <p><strong>Content:</strong> ${blog.content || ""}</p>
    ${blog.image ? `<img src="${blog.image}" class="img-fluid mb-3">` : ""}
    <h5>SEO Section</h5>
    <p><strong>Meta Title:</strong> ${blog.seo?.meta_title || ""}</p>
    <p><strong>Slug:</strong> ${blog.seo?.slug || ""}</p>
    <p><strong>Sort Order:</strong> ${blog.seo?.sort_order || ""}</p>
    <p><strong>Meta Keywords:</strong> ${blog.seo?.meta_keywords || ""}</p>
    <p><strong>Meta Description:</strong> ${blog.seo?.meta_description || ""}</p>
    <p><strong>Canonical URL:</strong> ${blog.seo?.canonical_url || ""}</p>
    <p><strong>Schema:</strong> <pre>${blog.seo?.schema || ""}</pre></p>
    <p><strong>Created At:</strong> ${new Date(blog.createdAt).toLocaleString()}</p>
  `;

  new bootstrap.Modal(document.getElementById("viewBlogModal")).show();
};

// ================= DELETE BLOG =================
window.deleteBlog = async function(id) {
  if (!confirm("Are you sure you want to delete this blog?")) return;
  await deleteDoc(doc(db, "blog", id));
  loadBlogs();
};
