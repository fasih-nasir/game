        //  ============== READ STORE CODE START ====================
 const storeTableBody = document.querySelector("#storeTable tbody");

// FETCH STORES
async function fetchStoreData() {
  storeTableBody.innerHTML = ""; // Clear previous data

  try {
    const storeCollection = collection(db, "page");
    const snapshot = await getDocs(storeCollection);

    if (snapshot.empty) {
      storeTableBody.innerHTML = `<tr><td colspan="7" class="text-center">No stores found</td></tr>`;
      return;
    }

    let counter = 1;

    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      console.log(data);
      
      const docId = docSnap.id;
      const createdAt = new Date(data.createdAt).toLocaleString();

      const row = document.createElement("tr");
     row.innerHTML = `
  <td>${counter++}</td>
  <td>${data.pageTitle || ""}</td>
  <td><a href="${data.affiliateURL}" target="_blank">${data.affiliateURL || ""}</a></td>
  <td>${data.metaTitle || ""}</td>
 
  <td>${data.img ? `<img src="${data.img}" width="100" class="img-thumbnail"/>` : ""}</td>
  <td>${createdAt}</td>
  <td>
<a href="edit_pages.html?id=${docId}">
    
    <button class="btn btn-sm bg-white p-1 shadow-lg me-1 edit-bt mb-2" data-id="${docId}">
      <i class="hgi hgi-stroke hgi-pencil-edit-02"></i>
    </button>
    </a>
    <button class="btn btn-sm bg-white p-1 shadow-lg delete-btn" data-id="${docId}">
      <i class="fa-solid fa-trash"></i>
    </button>
  </td>
`;

      storeTableBody.appendChild(row);
    });

  } catch (err) {
    console.error("Error fetching store data:", err);
    storeTableBody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Error loading data</td></tr>`;
  }
}

// DELETE FUNCTION
async function deleteStore(docId) {
  console.log(docId);
  
  if (!confirm("Are you sure you want to delete this store?")) return;

  try {
    await deleteDoc(doc(db, "store", docId));
    alert("Store deleted successfully!");
    fetchStoreData(); // Refresh table
  } catch (err) {
    console.error("Error deleting store:", err);
    alert("Failed to delete store!");
  }
}

// EDIT FUNCTION
async function editStore(docId) {
  try {
    const docRef = doc(db, "store", docId);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      alert("Store not found!");
      return;
    }

    const data = docSnap.data();

    const newName = prompt("Edit Store Name:", data.name || "");
    const newLink = prompt("Edit Store Link:", data.link || "");
    const newAbout = prompt("Edit About:", data.about || "");

    if (!newName || !newLink || !newAbout) return alert("All fields are required!");

    await updateDoc(docRef, {
      name: newName,
      link: newLink,
      about: newAbout
    });

    alert("Store updated successfully!");
    fetchStoreData(); // Refresh table
  } catch (err) {
    console.error("Error editing store:", err);
    alert("Failed to update store!");
  }
}

// ---------- EVENT DELEGATION ----------
storeTableBody.addEventListener("click", (e) => {
  if (e.target.matches(".edit-bt mb-2n")) {
    const id = e.target.dataset.id;
    editStore(id);
  }

  if (e.target.matches(".delete-btn")) {
    const id = e.target.dataset.id;
    console.log(id);
    
    deleteStore(id);
  }
});
