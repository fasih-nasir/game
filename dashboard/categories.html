<!DOCTYPE html>
<html lang="zxx">

  <head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Male_Fashion Timeless Jewelry & Elegant Rings for Every Occasion">
    <meta name="keywords" content="Male_Fashion, unica, creative, html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dashboard | Gearnix</title>
    <link rel="shortcut icon" href="/assets/logo/favicon.png"
      type="image/x-icon">
    <!-- Google Font -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Css Styles -->
    <link rel="stylesheet" href="../css/style.css" type="text/css">
  </head>

  <body>
    <!-- =========== MAIN CODE START ============= -->
    <main class="dash_main">

      <div class="d-flex align-items-start container-fluid dash_main_div" id="categories.html">
        <div id="nav_pills" class="col-lg-2 h-100"></div>
        <div class="tab-content col-lg-10 " id="v-pills-tabContent">
          <!-- =========== HOME CODE START ============== -->
          <div class="tab-pane fade show active" id="v-pills-home"
            role="tabpanel"
            aria-labelledby="v-pills-home-tab" tabindex="0">

            <div class="col-12 mx-0">
              <!-- ========= SEARCH CODE START ========= -->
              <div class="container-fluid mb-3 top_search_div">
                <div class="row">
                  <div class="col-lg-11">
                    <input class="form-control" type="search"
                      class="form-control"
                      placeholder="Seach Here">
                  </div>
                  <div class="col-lg-1">
                    <button id="logout-btn"
                      class="bg_grey border-0 shadow-sm px-3 py-2">Logout</button>

                  </div>
                </div>
              </div>
              <!-- ========= SEARCH CODE End ========= -->

              <!-- ====== TOP CARD'S CODE START ======== -->
              <div id="top_bar"></div>

              <!-- ====== TOP CARD'S CODE END ======== -->
              <div class="row  my-2 px-4">
                <div
                  class="col-lg-12 d-flex flex-row justify-content-between align-items-center">
                  <h5>Manage Category</h5>
                  <h5>Total Category : <span id="total_store">
                      <div
                        class="spinner-border spinner-border-sm  fw-lighter"
                        role="status">
                        <span class="visually-hidden">Loading...</span>
                      </div>
                    </span></h5>
                </div>
              </div>
              <!-- ========= ADD PRODUCT/CATEOGERY CODE START ========== -->

              <div class="container-fluid my-4 ">
                <table
                  class="table  proudct_table table-striped table-bordered table-responsive"
                  id="storeTable">
                  <thead class="table-success">
                    <tr>
                      <th>#</th>
                      <th>Category Name</th>
                      <th>SEO URL</th>
                      <th>Meta Title</th>

                      <th>Image</th>
                      <th>Status</th>

                      <th>Created At</th>
                      <th>Actions</th>
                    </tr>

                  </thead>
                  <tbody>
                    <!-- Data will be injected here dynamically -->
                  </tbody>
                </table>

              </div>
              <!-- ========= ADD PRODUCT/CATEOGERY CODE END ========== -->

            </div>
          </div>
          <!-- =========== HOME CODE START ============== -->

        </div>
      </div>
    </main>
    <!-- ============= MAIN CODE END ============= -->

    <!-- Js Plugins -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous">
        </script>

    <!-- Firebase and App Scripts -->
   
    <script src="js/app.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>

</html>
