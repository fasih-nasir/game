      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import { getFirestore, collection, getDocs,getDoc,doc ,addDoc,deleteDoc, updateDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);

 
    

const db = getFirestore(app);
    // ========== DOM References ==========

    (app);

// const productTableBody = document.getElementById("prodcut_of_home_page");

// Fetch all products
const reviewForm = document.getElementById("reviewForm");

reviewForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const country = document.getElementById("country").value.trim();
  const rating = parseInt(document.getElementById("rating").value);
  const reviewText = document.getElementById("reviewText").value.trim();
  const editId = document.getElementById("editId").value;

  if (!name || !country || !reviewText || !rating || rating < 1 || rating > 5) {
    alert("Please fill all fields correctly (Rating 1-5)");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "review", editId), {
      name, country, rating, review: reviewText
    });
  } else {
    await addDoc(collection(db, "review"), {
      name, country, rating, review: reviewText, createdAt: new Date()
    });
  }

  // Reset form
  reviewForm.reset();
  document.getElementById("editId").value = "";

  // Reload reviews
  loadReviews();
});

/* ====== LOAD REVIEWS FUNCTION ====== */
async function loadReviews() {
  const reviewList = document.getElementById("reviewList") || document.createElement("div");
  reviewList.id = "reviewList";
  reviewList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "review"));
  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    reviewList.innerHTML += `
      <div class=" p-3 mb-2 col-lg-6 shadow">
        <h6>${d.name} <small class="text-muted">(${d.country})</small></h6>
        <div>Rating: ${d.rating}/5</div>
        <p>${d.review}</p>
       <div>
         <button class="btn me-2" onclick="editReview('${docSnap.id}','${d.name}','${d.country}','${d.rating}','${d.review}')"><i class="hgi hgi-stroke hgi-pencil-edit-02"></i></button>
        <button class="btn " onclick="deleteReview('${docSnap.id}')"><i class="hgi hgi-stroke hgi-delete-01"></i></button>
        </div>
      </div>
    `;
  });

  if (!document.getElementById("reviewList")) {
    document.body.appendChild(reviewList);
  }
}

/* ===== EDIT FUNCTION ===== */
window.editReview = (id, name, country, rating, review) => {
  document.getElementById("editId").value = id;
  document.getElementById("name").value = name;
  document.getElementById("country").value = country;
  document.getElementById("rating").value = rating;
  document.getElementById("reviewText").value = review;
};

/* ===== DELETE FUNCTION ===== */
window.deleteReview = async (id) => {
  if (confirm("Delete review?")) {
    await deleteDoc(doc(db, "review", id));
    loadReviews();
  }
};

/* ===== INITIAL LOAD ===== */
loadReviews();
