<html lang="zxx">

    <head>
        <meta charset="UTF-8">
        <meta name="description"
            content="Male_Fashion Timeless Jewelry & Elegant Rings for Every Occasion">
        <meta name="keywords" content="Male_Fashion, unica, creative, html">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Dashboard | Gearnix</title>
        <link rel="shortcut icon" href="/assets/logo/favicon.png" type="image/x-icon">
        <!-- Google Font -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
            crossorigin="anonymous">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
            integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />

        <!-- Css Styles -->
        <link rel="stylesheet" href="../css/style.css" type="text/css">
    </head>

    <body>
        <!-- =========== MAIN CODE START ============= -->
        <main class="dash_main">

            <div class="d-flex align-items-start container-fluid dash_main_div" id="edit_categories">
                <div id="nav_pills" class="col-lg-2 h-100"></div>
                <div class="tab-content col-lg-10 " id="v-pills-tabContent">
                    <!-- =========== HOME CODE START ============== -->
                    <div class="tab-pane fade show active" id="v-pills-home"
                        role="tabpanel"
                        aria-labelledby="v-pills-home-tab" tabindex="0">

                        <div class="col-12 mx-0">
                            <!-- ========= SEARCH CODE START ========= -->
                            <div class="container-fluid mb-3 top_search_div">
                                <div class="row">
                                    <div class="col-lg-11">
                                        <input class="form-control" type="search"
                                            class="form-control"
                                            placeholder="Seach Here">
                                    </div>
                                    <div class="col-lg-1">
                                        <button id="logout-btn"
                                            class="bg_grey border-0 shadow-sm px-3 py-2">Logout</button>

                                    </div>
                                </div>
                            </div>
                            <!-- ========= SEARCH CODE End ========= -->

                            <!-- ====== TOP CARD'S CODE START ======== -->
                                                       <div id="top_bar"></div>

                            <!-- ====== TOP CARD'S CODE END ======== -->

                            <!-- ========= ADD PRODUCT/CATEOGERY CODE START ========== -->

                            <div class="container-fluid ">
                             <div class="">

<div class="container-fluid p-4 overflow_y">

    <h4 class="mb-4">Edit Category</h4>

 <form id="categoryForm">

<!-- ✅ Toggle Options -->
<div class="form-control mb-3">
  <div class="row px-2 justify-content-between align-items-center">

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="show_home">
      <label class="form-check-label" for="show_home">Show Home</label>
    </div>

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="recommended">
      <label class="form-check-label" for="recommended">Recommended</label>
    </div>

    <div class="col-md-2 form-check">
      <input class="form-check-input" type="checkbox" id="feature">
      <label class="form-check-label" for="feature">Feature</label>
    </div>

    <div class="col-md-2">
      <select id="Status" class="form-select">
        <option value="">Status</option>
        <option value="active">Active</option>
        <option value="disable">Disable</option>
      </select>
    </div>

  </div>
</div>

<!-- ✅ Basic Info -->
<div class="row mb-3">

  <div class="col-md-6">
    <div class="form-floating">
      <input type="text" class="form-control" id="name" placeholder="Category Name">
      <label for="name">Category Name *</label>
    </div>
  </div>

  <div class="col-md-6">
    <div class="form-floating">
      <input type="text" class="form-control" id="slug" placeholder="Page URL">
      <label for="slug">Page URL (package.html)</label>
    </div>
  </div>

</div>

<!-- ✅ Content -->
<div class="mb-3">
  <div class="form-floating">
    <textarea class="form-control" id="content" placeholder="Category Content" style="height:120px"></textarea>
    <label for="content">Category Content</label>
  </div>
</div>

<!-- ✅ Image Upload + Preview -->
<div class="mb-4">
  <label class="form-label">Category Image</label>
  
  <input type="file" id="image" class="form-control mb-3" accept="image/*">

  <div class="text-center">
    <img id="image_preview" src="https://placehold.co/600x400" 
         class="img-fluid rounded shadow" 
         style="max-height:150px;">
  </div>
</div>

<!-- ✅ SEO Accordion -->
<div class="accordion mb-3" id="seoAccordion">

  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#seoCollapse">
        SEO Settings
      </button>
    </h2>

    <div id="seoCollapse" class="accordion-collapse collapse" data-bs-parent="#seoAccordion">
      <div class="accordion-body">

        <div class="row mb-3">

          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control" id="meta_title" placeholder="Meta Title">
              <label for="meta_title">Meta Title</label>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control" id="meta_keywords" placeholder="Meta Keywords">
              <label for="meta_keywords">Meta Keywords</label>
            </div>
          </div>

        </div>

        <div class="mb-3">
          <div class="form-floating">
            <textarea class="form-control" id="meta_desc" placeholder="Meta Description" style="height:100px"></textarea>
            <label for="meta_desc">Meta Description</label>
          </div>
        </div>

        <div class="mb-3">
          <div class="form-floating">
            <input type="url" class="form-control" id="canonical" placeholder="Canonical URL">
            <label for="canonical">Canonical URL</label>
          </div>
        </div>

        <div class="mb-3">
          <div class="form-floating">
            <textarea class="form-control" id="schema" placeholder="Schema Markup" style="height:120px"></textarea>
            <label for="schema">Schema Markup (JSON-LD)</label>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- ✅ Submit -->
<div class="text-center">
  <button class="btn btn-dark px-5" type="submit">Update Now</button>
</div>

</form> 

</div>


</div>

                            </div>
                            <!-- ========= ADD PRODUCT/CATEOGERY CODE END ========== -->

                        </div>
                    </div>
                    <!-- =========== HOME CODE START ============== -->

                   
                </div>
            </div>
        </main>
        <!-- ============= MAIN CODE END ============= -->

        <!-- Js Plugins -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
            crossorigin="anonymous">
        </script>

        <script src="js/app.js" type="module"></script>
    </body>

</html>
