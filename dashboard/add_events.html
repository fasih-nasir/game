<div class="container-xxl py-2">

        <!-- Event Name -->

          </div>

          <div class="col-md-6">

        <!-- Dates -->
        <div class="row mb-3">

            <input type="date" class="form-control" id="date_available" name="date_available">
          </div>

          <div class="col-md-6">

            <input type="date" class="form-control" id="date_expiry" name="date_expiry">

        </div>

        <!-- SEO -->

              <input type="text" class="form-control" id="seo_url" name="seo_url" placeholder="SEO URL" required>

          <div class="col-md-6">

          </div>
        </div>

        <div class="row mb-3">

            <div class="form-floating">
              <input type="text" class="form-control" id="meta_keywords" name="meta_keywords" placeholder="Meta Keywords">
              <label for="meta_keywords">Meta Keywords</label>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <textarea class="form-control" id="meta_description" name="meta_description" style="height:100px" placeholder="Meta Description"></textarea>
              <label for="meta_description">Meta Description</label>
            </div>
          </div>
        </div>

        <!-- Images -->
        <div class="row mb-4">

const db = getFirestore(app);

        //  ============== ADD STORE CODE START ====================
 const eventForm = document.getElementById("eventform");

  eventForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      // ================= BASIC INFO =================
      const event_name        = document.getElementById("event_name").value;
      const event_type        = document.getElementById("event_type").value;
      const date_available    = document.getElementById("date_available").value;
      const date_expiry       = document.getElementById("date_expiry").value;

      // ================= SEO =================
      const seo_url           = document.getElementById("seo_url").value;
      const meta_title        = document.getElementById("meta_title").value;
      const meta_keywords     = document.getElementById("meta_keywords").value;
      const meta_description = document.getElementById("meta_description").value;

      // ================= CONTENT =================
      const short_content     = document.getElementById("event_short_content").value;
      const detail_description= document.getElementById("detail_description").value;

      // ================= CHECKBOXES =================
      const status       = document.getElementById("status").checked;        // true / false
      const show_footer  = document.getElementById("show_footer").checked;   // true / false

      // ================= FILES =================
      const front_image      = document.getElementById("event_image").files[0];
      const button_icon      = document.getElementById("button_icon").files[0];
      const cover_image      = document.getElementById("cover_image").files[0];
      const no_product_cover  = document.getElementById("no_product_cover").files[0];

      // ================= CLOUDINARY CONFIG =================
      const cloudName = "dabky3wky";     // tumhara cloud name
      const uploadPreset = "gimpex";     // unsigned preset

      // 🔁 reusable upload function
      const uploadImage = async (file) => {
        if (!file) return "";
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", uploadPreset);

        const res = await fetch(
          `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
          { method: "POST", body: formData }
        );

        const data = await res.json();
        return data.secure_url || "";
      };

      // ================= UPLOAD IMAGES =================
      const frontImageUrl     = await uploadImage(front_image);
      const buttonIconUrl     = await uploadImage(button_icon);
      const coverImageUrl     = await uploadImage(cover_image);
      const noproductCoverUrl  = await uploadImage(no_product_cover);

      // ================= SAVE TO FIRESTORE =================
      const eventsRef = collection(db, "events");

      await addDoc(eventsRef, {
        event_name,
        event_type,
        dates: {
          available: date_available || "",
          expiry: date_expiry || ""
        },

        content: {
          short: short_content || "",
          detail: detail_description || ""
        },

        images: {
          front: frontImageUrl,
          button_icon: buttonIconUrl,
          cover: coverImageUrl,
          no_product_cover: noproductCoverUrl
        },

        seo: {
          seo_url,
          meta_title: meta_title || "",
          meta_keywords: meta_keywords || "",
          meta_description: meta_description || ""
        },

        status: status,           // true = enabled
        show_footer: show_footer, // true = show

        createdAt: new Date().toISOString()
      });

      alert("✅ Event saved successfully!");
      eventForm.reset();

    } catch (error) {
      console.error(error);
      alert("❌ Error saving event!");
    }
  });
  </script>
