   <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc,onSnapshot,deleteDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        const firebaseConfig = {
  apiKey: "AIzaSyB7tXC_WwsU-bxv3xqFt9JTdFUj-3wmmms",
  authDomain: "game-3df4d.firebaseapp.com",
  projectId: "game-3df4d",
  storageBucket: "game-3df4d.firebasestorage.app",
  messagingSenderId: "324919159749",
  appId: "1:324919159749:web:1ef8ee2197c68bcf65b9ac",
  measurementId: "G-E9912X3V8B"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const categorySelect = document.getElementById("category");
const categoryCollection = collection(db, "blog_categories");

// Real-time listener to populate select
onSnapshot(categoryCollection, (snapshot) => {
  // Clear previous options except the first placeholder
  categorySelect.innerHTML = '<option value="">-- Select Category --</option>';

  snapshot.docs.forEach(docItem => {
    const data = docItem.data();

    const option = document.createElement("option");
    option.value = data.name;        // you can use ID as value
    option.textContent = data.name;   // name shown to user
    categorySelect.appendChild(option);
  });
});
// Cloudinary Config
 const cloudName = "dnob3deih";      // your Cloudinary cloud_name
    const uploadPreset = "games-acc"; 

// ============== ADD BLOG CODE START ====================

const blogForm = document.getElementById("blogsForm");

blogForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    // ================= GET FORM VALUES =================
    const featured = document.getElementById("featured").checked;
    const recommended = document.getElementById("recommended").checked;
    const status = document.getElementById("status").checked ? "published" : "draft";

    const title = document.getElementById("title").value;
    const author = document.getElementById("author").value;
    const category_id = document.getElementById("category").value;
    const excerpt = document.getElementById("excerpt").value;

    const meta_title = document.getElementById("meta_title").value;
    const slug = document.getElementById("slug").value;
    const sort_order = document.getElementById("sort_order").value;
    const meta_keywords = document.getElementById("meta_keywords").value;
    const meta_description = document.getElementById("meta_description").value;
    const canonical_url = document.getElementById("canonical_url").value;
    const schema = document.getElementById("schema").value;

    // Quill editor content
    const content = document.querySelector("#editor").innerHTML;

    // ================= IMAGE UPLOAD =================
    const imageFile = document.getElementById("featured_image").files[0];
    let imageUrl = "";

    if (imageFile) {
      const cloudName = "dnob3deih";
      const uploadPreset = "games-acc";

      const formData = new FormData();
      formData.append("file", imageFile);
      formData.append("upload_preset", uploadPreset);

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
        {
          method: "POST",
          body: formData
        }
      );

      const data = await response.json();
      imageUrl = data.secure_url;
    }

    // ================= SAVE TO FIRESTORE =================
    const blogCollection = collection(db, "blog");

    await addDoc(blogCollection, {
      featured,
      recommended,
      status,
      title,
      author,
      category_id,
      excerpt,
      content,

      seo: {
        meta_title,
        slug,
        sort_order,
        meta_keywords,
        meta_description,
        canonical_url,
        schema
      },

      image: imageUrl,
      createdAt: new Date().toISOString()
    });

    alert("✅ Blog published successfully!");
    blogForm.reset();

  } catch (error) {
    console.error(error);
    alert("❌ Error saving blog!");
  }
});

// ============== ADD BLOG CODE END ====================
</script>
