<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Impex Florida</title>
  <link rel="shortcut icon" href="assets/logo/favicon.png" type="image/x-icon">

 
  <link rel="stylesheet" href="css/style.css">
  <!-- ✅ Bootstrap 5 CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
    crossorigin="anonymous">

  <!-- ✅ Font Awesome 6 -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

    <main id="checkout_page">

        <div class="container my-5">
    <div class="row g-5">
<div class="col-lg-7 border-end pe-lg-5">

  <!-- LOGO -->
  <a class="navbar-brand col-lg-4 m-0 p-0 col-4 d-flex align-items-center mb-4" href="#">
    <img src="/assets/logo/logo.png" class="img-fluid col-lg-3 col-4" alt="Logo">
    <h4 class="lh-1 fs-5 fw-medium ms-2">
      Global Impex <br> <span class="col-org">Florida</span>
    </h4>
  </a>

  <!-- CONTACT -->
  <h5 class="fw-normal mb-3">Contact</h5>

  <form id="checkout_dorm">
    
  <div class="form-floating mb-3">
    <input type="email" class="form-control" id="email" placeholder="Email or mobile">
    <label for="email">Email or mobile phone number</label>
  </div>

  <div class="form-check mb-4">
    <input class="form-check-input" type="checkbox" id="news">
    <label class="form-check-label small" for="news">
      Email me with news and offers
    </label>
  </div>

  <!-- DELIVERY -->
  <h5 class="fw-normal mb-3">Delivery</h5>



  <div class="row g-2 mb-3">
    <div class="col-md-6">
      <div class="form-floating">
        <input class="form-control" id="fname" placeholder="First name">
        <label for="fname">First name</label>
      </div>
    </div>

    <div class="col-md-6">
      <div class="form-floating">
        <input class="form-control" id="lname" placeholder="Last name">
        <label for="lname">Last name</label>
      </div>
    </div>
  </div>

  <div class="form-floating mb-3">
    <input class="form-control" id="address" placeholder="Address">
    <label for="address">Address</label>
  </div>

  <div class="form-floating mb-3">
    <input class="form-control" id="apartment" placeholder="Apartment">
    <label for="apartment">Apartment (optional)</label>
  </div>

  <div class="form-floating mb-3">
    <input class="form-control" id="city" placeholder="City">
    <label for="city">City</label>
  </div>

  <div class="form-floating mb-3">
    <input class="form-control" id="postal" placeholder="Postal code">
    <label for="postal">Postal code (optional)</label>
  </div>

  <div class="form-floating mb-3">
    <input class="form-control" id="phone" placeholder="Phone">
    <label for="phone">Phone</label>
  </div>

  <div class="form-check mb-4">
    <input class="form-check-input" type="checkbox" id="saveInfo">
    <label class="form-check-label small" for="saveInfo">
      Save this information
    </label>
  </div>

  <!-- SHIPPING -->
  <h5 class="fw-normal mb-3">Shipping Method</h5>

  <select class="form-select mb-3">
    <option>Choose shipping method</option>
  </select>

  <p class="small mb-4">Shipping Charges: <strong>Rs 200</strong></p>

  <!-- PAYMENT -->
  <h5 class="fw-normal mb-3">Payment</h5>
  <p class="small text-muted">All transactions are secure and encrypted.</p>

  <div class="form-check">
    <input class="form-check-input" type="radio" name="pay" id="card" checked>
    <label class="form-check-label" for="card">Debit / Credit Card</label>
  </div>

  <div class="form-check">
    <input class="form-check-input" type="radio" name="pay" id="cod">
    <label class="form-check-label" for="cod">Cash on Delivery (COD)</label>
  </div>

  <div class="form-check mb-4">
    <input class="form-check-input" type="radio" name="pay" id="bank">
    <label class="form-check-label" for="bank">Bank Transfer</label>
  </div>

  <button class="btn btn-dark w-100 py-3 checkout_Form" type="submit">Submit Order</button>

  </form>
</div>

       <div class="col-lg-5 ps-lg-5">

  <h5 class="fw-bold mb-4">Order Summary</h5>

  <div id="checkoutItems"></div>

  <!-- DISCOUNT -->


  <hr>

  <!-- TOTAL -->
  <div class="d-flex justify-content-between">
    <span>Subtotal</span>
    <span id="subTotal">Rs 0</span>
  </div>


  <hr>



</div>
    </div>
</div>
    </main>
    <!-- ========= MAIN CODE END ============== -->
    
    <!-- ========== FOOTER CODE START ============ -->
  
     <!-- =========== FOOTER CODE END ============= -->

  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
    crossorigin="anonymous"></script>
  <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>
    <!-- =========== SWIPER CDN ========== -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
       <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

})();
</script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
